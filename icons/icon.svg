<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#2D4258"/>
      <stop offset="100%" stop-color="#1E2F4A"/>
    </radialGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E68A4A"/>
      <stop offset="100%" stop-color="#D47A3A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Rounded background matching phone frame style -->
  <rect width="512" height="512" rx="90" fill="url(#bgGrad)"/>

  <!-- Subtle texture overlay -->
  <rect width="512" height="512" rx="90" fill="white" opacity="0.02"/>

  <!-- Main speech bubble -->
  <g filter="url(#softShadow)">
    <path d="M256 125
             C340 125 400 176 400 240
             C400 304 340 355 256 355
             C232 355 210 351 190 344
             L140 380
             L158 345
             C125 320 112 282 112 240
             C112 176 172 125 256 125Z"
          fill="none" stroke="url(#bubbleGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"
          filter="url(#glow)"/>

    <!-- Voice waveform bars inside bubble -->
    <g transform="translate(256, 262)" filter="url(#glow)">
      <rect x="-40" y="-35" width="10" height="32" rx="5" fill="#D47A3A" opacity="0.45"/>
      <rect x="-22" y="-48" width="10" height="58" rx="5" fill="#D47A3A" opacity="0.7"/>
      <rect x="-4" y="-62" width="10" height="80" rx="5" fill="#E68A4A"/>
      <rect x="14" y="-48" width="10" height="58" rx="5" fill="#D47A3A" opacity="0.7"/>
      <rect x="32" y="-35" width="10" height="32" rx="5" fill="#D47A3A" opacity="0.45"/>
    </g>
  </g>
</svg>