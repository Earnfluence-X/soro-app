<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#D47A3A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SORO">
    <meta name="description" content="SORO - talk, simply. A warm messaging app.">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <title>SORO - talk, simply.</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <div id="loading-screen" class="screen active">
            <div class="loading-container">
                <svg class="loading-icon" viewBox="0 0 512 512" width="80" height="80">
                    <path d="M256 125 C340 125 400 176 400 240 C400 304 340 355 256 355 C232 355 210 351 190 344 L140 380 L158 345 C125 320 112 282 112 240 C112 176 172 125 256 125Z" fill="none" stroke="#D47A3A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
                        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
                    </path>
                    <g transform="translate(256, 262)">
                        <rect x="-40" y="-35" width="10" height="32" rx="5" fill="#D47A3A" opacity="0.45"><animate attributeName="opacity" values="0.45;0.7;0.45" dur="1.5s" repeatCount="indefinite"/></rect>
                        <rect x="-22" y="-48" width="10" height="58" rx="5" fill="#D47A3A" opacity="0.7"><animate attributeName="opacity" values="0.7;1;0.7" dur="1.2s" repeatCount="indefinite"/></rect>
                        <rect x="-4" y="-62" width="10" height="80" rx="5" fill="#E68A4A"><animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/></rect>
                        <rect x="14" y="-48" width="10" height="58" rx="5" fill="#D47A3A" opacity="0.7"><animate attributeName="opacity" values="0.7;1;0.7" dur="1.2s" repeatCount="indefinite"/></rect>
                        <rect x="32" y="-35" width="10" height="32" rx="5" fill="#D47A3A" opacity="0.45"><animate attributeName="opacity" values="0.45;0.7;0.45" dur="1.5s" repeatCount="indefinite"/></rect>
                    </g>
                </svg>
                <div class="loading-text">SORO</div>
                <div class="loading-spinner"></div>
            </div>
        </div>
        <div id="screen-container"></div>
        <div id="toast" class="toast"></div>
        <button id="install-btn" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;padding:12px 24px;background:#D47A3A;color:white;border:none;border-radius:24px;font-weight:600;font-size:14px;cursor:pointer;box-shadow:0 4px 16px rgba(212,122,58,0.4);">Install SORO</button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, updatePassword, updateEmail, deleteUser } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, query, where, orderBy, limit, onSnapshot, addDoc, serverTimestamp, arrayUnion, arrayRemove, increment, writeBatch, getDocs, runTransaction } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getDatabase, ref as rtdbRef, set, onDisconnect, serverTimestamp as rtdbTimestamp, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "{{FIREBASE_API_KEY}}",
            authDomain: "{{FIREBASE_AUTH_DOMAIN}}",
            projectId: "{{FIREBASE_PROJECT_ID}}",
            storageBucket: "{{FIREBASE_STORAGE_BUCKET}}",
            messagingSenderId: "{{FIREBASE_MESSAGING_SENDER_ID}}",
            appId: "{{FIREBASE_APP_ID}}"
        };

        const app = initializeApp(firebaseConfig);
        window.firebase = {
            auth: getAuth(app),
            db: getFirestore(app),
            rtdb: getDatabase(app),
            serverTimestamp: serverTimestamp,
            arrayUnion: arrayUnion,
            arrayRemove: arrayRemove,
            increment: increment,
            signInWithEmailAndPassword: signInWithEmailAndPassword,
            createUserWithEmailAndPassword: createUserWithEmailAndPassword,
            signOut: signOut,
            onAuthStateChanged: onAuthStateChanged,
            sendPasswordResetEmail: sendPasswordResetEmail,
            updatePassword: updatePassword,
            updateEmail: updateEmail,
            deleteUser: deleteUser,
            collection: collection,
            doc: doc,
            setDoc: setDoc,
            getDoc: getDoc,
            updateDoc: updateDoc,
            deleteDoc: deleteDoc,
            query: query,
            where: where,
            orderBy: orderBy,
            limit: limit,
            onSnapshot: onSnapshot,
            addDoc: addDoc,
            writeBatch: writeBatch,
            getDocs: getDocs,
            runTransaction: runTransaction,
            rtdbRef: rtdbRef,
            set: set,
            onDisconnect: onDisconnect,
            rtdbTimestamp: rtdbTimestamp,
            onValue: onValue
        };
    </script>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/groups.js"></script>
    <script src="/js/stories.js"></script>
    <script src="/js/communities.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').catch(function() {});
            });
        }

        var deferredPrompt;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            var installBtn = document.getElementById('install-btn');
            if (installBtn) {
                installBtn.style.display = 'block';
                installBtn.addEventListener('click', function() {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(function(result) {
                        deferredPrompt = null;
                        installBtn.style.display = 'none';
                    });
                });
            }
        });

        window.addEventListener('appinstalled', function() {
            var installBtn = document.getElementById('install-btn');
            if (installBtn) installBtn.style.display = 'none';
            deferredPrompt = null;
        });
    </script>
</body>
</html>
